<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>PCB Defect Detection - Web App</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            min-height: 100vh;
            padding: 10px;
        }

        .container {
            max-width: 500px;
            margin: 0 auto;
            background: white;
            border-radius: 15px;
            box-shadow: 0 10px 40px rgba(0, 0, 0, 0.2);
            overflow: hidden;
        }

        .header {
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            color: white;
            padding: 20px;
            text-align: center;
        }

        .header h1 {
            font-size: 24px;
            margin-bottom: 5px;
        }

        .header p {
            font-size: 12px;
            opacity: 0.9;
        }

        .tabs {
            display: flex;
            border-bottom: 2px solid #e0e0e0;
        }

        .tab-button {
            flex: 1;
            padding: 15px;
            border: none;
            background: white;
            cursor: pointer;
            font-size: 14px;
            font-weight: 500;
            color: #666;
            transition: all 0.3s;
        }

        .tab-button.active {
            background: #667eea;
            color: white;
            border-bottom: 3px solid #667eea;
        }

        .tab-content {
            display: none;
            padding: 20px;
            animation: fadeIn 0.3s;
        }

        .tab-content.active {
            display: block;
        }

        @keyframes fadeIn {
            from { opacity: 0; }
            to { opacity: 1; }
        }

        /* Upload Section */
        .upload-section {
            text-align: center;
        }

        .upload-box {
            border: 2px dashed #667eea;
            border-radius: 10px;
            padding: 30px 20px;
            cursor: pointer;
            transition: all 0.3s;
            background: #f8f9ff;
        }

        .upload-box:hover {
            background: #f0f2ff;
            border-color: #764ba2;
        }

        .upload-box input {
            display: none;
        }

        .upload-icon {
            font-size: 40px;
            margin-bottom: 10px;
        }

        .upload-text {
            color: #667eea;
            font-weight: 500;
            margin-bottom: 5px;
        }

        .upload-subtext {
            color: #999;
            font-size: 12px;
        }

        .preview-image {
            margin-top: 20px;
            max-width: 100%;
            border-radius: 10px;
            max-height: 300px;
        }

        .detect-button {
            width: 100%;
            padding: 12px;
            margin-top: 20px;
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            color: white;
            border: none;
            border-radius: 8px;
            font-size: 16px;
            font-weight: 600;
            cursor: pointer;
            transition: all 0.3s;
        }

        .detect-button:hover {
            transform: translateY(-2px);
            box-shadow: 0 5px 20px rgba(102, 126, 234, 0.4);
        }

        .detect-button:disabled {
            opacity: 0.5;
            cursor: not-allowed;
        }

        /* Results Section */
        .result-card {
            background: #f8f9ff;
            border-left: 4px solid #667eea;
            padding: 15px;
            margin-bottom: 15px;
            border-radius: 8px;
        }

        .result-status {
            display: inline-block;
            padding: 5px 12px;
            border-radius: 20px;
            font-size: 12px;
            font-weight: 600;
            margin-bottom: 10px;
        }

        .status-defect-found {
            background: #ffebee;
            color: #c62828;
        }

        .status-no-defect {
            background: #e8f5e9;
            color: #2e7d32;
        }

        .status-processing {
            background: #fff3e0;
            color: #e65100;
        }

        .result-details {
            font-size: 13px;
            color: #666;
            margin-top: 10px;
        }

        .result-details strong {
            color: #333;
        }

        .defect-list {
            margin-top: 10px;
            padding-left: 15px;
        }

        .defect-item {
            margin: 5px 0;
            font-size: 12px;
            color: #666;
        }

        .confidence {
            display: inline-block;
            background: #667eea;
            color: white;
            padding: 2px 8px;
            border-radius: 4px;
            font-size: 11px;
            margin-left: 5px;
        }

        /* History Section */
        .history-list {
            max-height: 500px;
            overflow-y: auto;
        }

        .history-item {
            padding: 12px;
            border: 1px solid #e0e0e0;
            border-radius: 8px;
            margin-bottom: 10px;
            background: #fafafa;
        }

        .history-time {
            font-size: 12px;
            color: #999;
        }

        .history-status {
            margin: 8px 0;
            font-weight: 500;
        }

        .history-summary {
            font-size: 12px;
            color: #666;
        }

        /* Loading */
        .loading {
            display: none;
            text-align: center;
            padding: 20px;
        }

        .loading.active {
            display: block;
        }

        .spinner {
            border: 4px solid #f3f3f3;
            border-top: 4px solid #667eea;
            border-radius: 50%;
            width: 30px;
            height: 30px;
            animation: spin 1s linear infinite;
            margin: 0 auto 10px;
        }

        @keyframes spin {
            0% { transform: rotate(0deg); }
            100% { transform: rotate(360deg); }
        }

        /* Error */
        .error-message {
            background: #ffebee;
            color: #c62828;
            padding: 12px;
            border-radius: 8px;
            margin-bottom: 15px;
            font-size: 13px;
        }

        /* Success */
        .success-message {
            background: #e8f5e9;
            color: #2e7d32;
            padding: 12px;
            border-radius: 8px;
            margin-bottom: 15px;
            font-size: 13px;
        }

        /* Mobile responsive */
        @media (max-width: 480px) {
            .header h1 {
                font-size: 20px;
            }

            .tab-button {
                font-size: 13px;
                padding: 12px;
            }

            .upload-box {
                padding: 20px 15px;
            }

            .result-card {
                padding: 12px;
            }
        }
    </style>
</head>
<body>
    <div class="container">
        <!-- Header -->
        <div class="header">
            <h1>🔍 PCB Detection</h1>
            <p>Quality Assurance System</p>
        </div>

        <!-- Tabs -->
        <div class="tabs">
            <button class="tab-button active" onclick="switchTab('upload')">Upload</button>
            <button class="tab-button" onclick="switchTab('results')">Results</button>
            <button class="tab-button" onclick="switchTab('history')">History</button>
        </div>

        <!-- Tab: Upload -->
        <div class="tab-content active" id="upload">
            <div id="uploadError" class="error-message" style="display:none;"></div>

            <div class="upload-box" onclick="document.getElementById('imageInput').click()">
                <div class="upload-icon">📷</div>
                <div class="upload-text">Tap to Upload Image</div>
                <div class="upload-subtext">OR drag and drop PCB image</div>
                <input type="file" id="imageInput" accept="image/*" onchange="handleImageSelect(event)">
            </div>

            <img id="preview" class="preview-image" style="display:none;">

            <button class="detect-button" id="detectBtn" onclick="runDetection()" disabled>
                Analyze PCB
            </button>

            <div id="uploadLoading" class="loading">
                <div class="spinner"></div>
                <p>Processing...</p>
            </div>
        </div>

        <!-- Tab: Results -->
        <div class="tab-content" id="results">
            <div id="resultsContent">
                <p style="color: #999; text-align: center;">No results yet. Upload an image to start.</p>
            </div>
        </div>

        <!-- Tab: History -->
        <div class="tab-content" id="history">
            <div id="historyList" class="history-list">
                <p style="color: #999; text-align: center;">No history yet.</p>
            </div>
        </div>
    </div>

    <!-- No external APIs needed - uses Azure backend directly -->
    <script src="app.js"></script>
</body>
</html>
